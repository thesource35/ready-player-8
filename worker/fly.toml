# Phase 22 ffmpeg worker — Fly.io deployment config.
# Secrets (WORKER_SHARED_SECRET, SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_URL)
# MUST be set via `fly secrets set KEY=value` — never committed here.
#
# Always-on (auto_stop_machines=false, min_machines_running=1) per 22-RESEARCH.md:
# cold-starts during a transcode would miss the DB trigger fire-and-forget POST.

app = "constructionos-video-worker"
primary_region = "iad"   # operator: update to the region nearest the Supabase project

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048

[[services.http_checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "get"
  path = "/health"
