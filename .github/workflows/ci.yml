name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      # 2026-05-07: macos-15 runner image ships without iOS Simulator runtime
      # pre-installed (only macOS + visionOS in `xcodebuild -showdestinations`).
      # Without this step, build/test silently no-op'd because
      # `name=iPhone 16,OS=latest` never resolved to a real destination, and
      # the previous `|| true` masked the failure entirely. Install iOS
      # platform explicitly so the simulator + iPhone device profiles exist.
      - name: Install iOS Simulator runtime
        run: |
          xcodebuild -downloadPlatform iOS
          xcrun simctl list devices available | head -40

      # Pinned to iPhone 17 to match local dev convention. Removed `|| true`
      # so iOS build failures actually fail CI (the whole point of CI).
      - name: Build iOS
        run: |
          set -o pipefail
          xcodebuild build \
            -project "ready player 8.xcodeproj" \
            -scheme "ready player 8" \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "ready player 8.xcodeproj" \
            -scheme "ready player 8" \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=moderate

  link-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Real broken external references (partner pages 404'd, future production
    # domains not yet registered) shouldn't block development merges. The
    # daily scheduled "Link Health Audit" workflow continues to surface drift
    # asynchronously, and this CI run still reports findings on the PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run link audit
        env:
          LINKCHECK_SHOW_BLOCKED: "0"
        run: node web/scripts/link-health.mjs
