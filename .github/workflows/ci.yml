name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    # Pin Xcode 26.3 (matches developer-local Xcode 26.3) + iOS 26.2 destination
    # (iOS 26.3 simulator runtime is NOT pre-installed on macos-26 as of May 2026
    # — image ships iOS 26.1 / 26.2 / 26.4). Patch mismatch is fine for
    # compile-only verification of iOS 26 SDK semantics (Chart inference +
    # Swift 6 concurrency behavior is iOS-major-SDK triggered, not patch-level).
    #
    # Audit periodically against:
    #   https://github.com/actions/runner-images/blob/main/images/macos/macos-26-arm64-Readme.md
    # If iOS 26.2 is removed from the image, this pin must move to the next
    # pre-installed iOS 26.x runtime — failing to do so will surface visibly
    # in the "Show available iOS Simulator destinations" step below, NOT
    # silently. (T-999.10-02 still applies)
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v5

      # Sanity assertion: surface destination availability in the log so future
      # runtime-removal events are caught the FIRST CI run, not weeks later.
      # (T-999.10-01 — silent failure mitigation)
      - name: Show available iOS Simulator destinations
        run: |
          xcodebuild -version
          echo "--- iOS Simulator destinations ---"
          xcrun simctl list devices available | { grep -E "iOS|iPhone" || :; }

      # Compile-only verification per Phase 22 / 29.1 / 30 precedent (STATE.md):
      # ready_player_8Tests.swift has 30+ pre-existing async/concurrency errors
      # that block `xcodebuild test`. Re-enable the test step ONLY after a
      # focused phase repairs the test target.
      # TODO(999.10): re-enable xcodebuild test step once
      # ready_player_8Tests.swift async errors are fixed (tracked in
      # Phase 22 deferred-items). Grep marker: TODO(999.10) (T-999.10-03)
      - name: Build iOS (compile-only — see TODO above)
        run: |
          xcodebuild build \
            -project "ready player 8.xcodeproj" \
            -scheme "ready player 8" \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify --renderer github-actions

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - run: npm audit --audit-level=moderate

  link-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Real broken external references (partner pages 404'd, future production
    # domains not yet registered) shouldn't block development merges. The
    # daily scheduled "Link Health Audit" workflow continues to surface drift
    # asynchronously, and this CI run still reports findings on the PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run link audit
        env:
          LINKCHECK_SHOW_BLOCKED: "0"
        run: node web/scripts/link-health.mjs
