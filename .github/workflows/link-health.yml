name: Link Health Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run link audit
        env:
          LINKCHECK_SHOW_BLOCKED: "0"
        run: node web/scripts/link-health.mjs
