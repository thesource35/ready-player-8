# SwiftLint Configuration — ConstructionOS

included:
  - "ready player 8"

excluded:
  - "ready player 8Tests"
  - Pods
  - .build

disabled_rules:
  - trailing_whitespace
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - force_cast

opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - contains_over_filter_count
  - discouraged_optional_boolean
  - fallthrough
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

type_name:
  min_length: 2
  max_length: 60

identifier_name:
  min_length: 1
  max_length: 60
  excluded:
    - id
    - x
    - y
    - i
    - p
    - t
    - g
    - l
    - m
    - d
    - co

nesting:
  type_level: 3
  function_level: 5

reporter: xcode
